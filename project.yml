# Generate Xcode project on macOS: brew install xcodegen && xcodegen generate
name: RepDetect
options:
  bundleIdPrefix: com.repdetect
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_OBJC_BRIDGING_HEADER: RepDetect/RepDetect-Bridging-Header.h
    HEADER_SEARCH_PATHS: $(SRCROOT)/RepDetectNative
    USER_HEADER_SEARCH_PATHS: $(SRCROOT)/RepDetectNative
    GCC_PREFIX_HEADER: ""
    OTHER_LDFLAGS: -lm
targets:
  RepDetect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepDetect
        excludes:
          - "**/.DS_Store"
      - path: RepDetectNative
        compilerFlags: "-std=c11"
    resources:
      - path: Resources/pose
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: RepDetect/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.repdetect.RepDetect
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
